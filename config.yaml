database:
  db_name: pi_controller
  host: localhost
  password: ${DB_PASSWORD}
  pool_size: 10
  port: 5432
  user: pi_controller
network:
  probe_ssh: true
  probe_timeout_s: 3
  scan_interval_s: 86400
  subnet: 10.10.30.50-10.10.30.70
server:
  host: 0.0.0.0
  log_level: DEBUG
  port: 8000
  workers: 4
ssh:
  parallel_limit: 1
  private_key_path: /home/user/.ssh/id_rpi
  retry_count: 3
  retry_delay_s: 1
  timeout_s: 30
  username: vyroba
